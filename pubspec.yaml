name: flutter_biolerplate
description: "A production-ready Flutter application with Clean Architecture"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Navigation
  go_router: ^14.2.0
  
  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.2
  
  # Networking
  dio: ^5.5.0
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1
  dio_smart_retry: ^6.0.0
  
  # Serialization
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  
  # Security
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0
  
  # Storage
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  
  # Utils
  intl: ^0.19.0
  dartz: ^0.10.1
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.2
  
  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  melos: ^6.1.0
  
  # Code Generation
  build_runner: ^2.4.11
  freezed: ^2.5.2
  injectable_generator: ^2.4.2

  # Testing
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/animations/
